<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KADRY — إتمام الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
/* تطبيق خط Cairo على جميع الكلمات والعناصر النصية والمدخلات */
*, html, body, input, textarea, select, button, span, p, div, h1, h2, h3, a { 
  font-family: 'Cairo', sans-serif !important; 
  box-sizing: border-box;
}

/* استثناء الأيقونات لضمان ظهورها بشكل سليم وعدم اختفائها */
.fas, .far, .fab, i {
  font-family: 'Font Awesome 6 Free' !important;
  font-weight: 900 !important;
}

:root{
  --navy:#ffffff;--navy2:#f9f9f9;--navy3:#f5f5f5;
  --text:#000000;--muted:rgba(0,0,0,0.5);--border:rgba(0,0,0,0.08);--card:#ffffff;
}
body{background:var(--navy2);color:var(--text);min-height:100vh;}
.nav-glass{background:#fff;border-bottom:1px solid var(--border);}
.form-card{background:#fff;border:1px solid var(--border);padding:28px;box-shadow:4px 4px 0 rgba(0,0,0,0.04);}
.form-label{display:block;font-size:0.78rem;font-weight:900;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px;}
.form-input{width:100%;background:var(--navy3);border:1.5px solid var(--border);color:#000;font-size:0.92rem;padding:13px 16px;outline:none;transition:border-color 0.2s;border-radius:2px;}
.form-input:focus{border-color:#000;}
.form-input.error{border-color:#ef4444;}
.form-error{font-size:0.75rem;color:#ef4444;font-weight:700;margin-top:5px;min-height:16px;}
.pay-option{flex:1;border:1.5px solid var(--border);padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;border-radius:2px;}
.pay-option.active{border-color:#000;background:#f9f9f9;box-shadow:3px 3px 0 rgba(0,0,0,0.08);}
.pay-option i{font-size:1.3rem;color:var(--muted);}
.pay-option.active i{color:#000;}
.summary-card{background:#fff;border:1.5px solid #000;padding:22px;position:sticky;top:80px;box-shadow:4px 4px 0 rgba(0,0,0,0.06);}
.order-btn{width:100%;background:#000;color:#fff;font-weight:900;font-size:1rem;padding:16px;border:none;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:0.5px;box-shadow:4px 4px 0 rgba(0,0,0,0.2);border-radius:2px;}
.order-btn:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(0,0,0,0.3);}
.order-btn:disabled{opacity:0.7;cursor:not-allowed;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;}
.step-active{background:#000;color:#fff;}
.step-done{background:#f0f0f0;color:#000;border:1.5px solid #000;}
.step-next{background:#f0f0f0;color:var(--muted);}
</style>
</head>
<body x-data="checkoutPage()" x-init="init()">

<!-- NAV -->
<nav class="nav-glass sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="index.html" style="font-size:1.5rem;font-weight:900;color:#000;letter-spacing:3px;">KADRY</a>
    <div class="hidden md:flex items-center gap-2 text-xs font-bold" style="color:var(--muted);">
      <div class="step-dot step-done"><i class="fas fa-check" style="font-size:0.65rem;"></i></div>
      <span style="color:#000;">السلة</span>
      <span style="margin:0 4px;">—</span>
      <div class="step-dot step-active">2</div>
      <span style="color:#000;">الطلب</span>
      <span style="margin:0 4px;">—</span>
      <div class="step-dot step-next">3</div>
      <span>التأكيد</span>
    </div>
  </div>
</nav>

<!-- FORM AND SUMMARY SECTION -->
<div x-show="!orderDone" class="max-w-5xl mx-auto px-4 py-10">
  <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:28px;display:flex;align-items:center;gap:10px;">
    <i class="fas fa-map-marker-alt" style="color:#000;"></i> بيانات التوصيل
  </h1>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
    <!-- FORM -->
    <div class="lg:col-span-3">
      <div class="form-card">
        <div style="margin-bottom:18px;">
          <label class="form-label">الاسم الكامل *</label>
          <input x-model="form.name" type="text" placeholder="محمد أحمد" class="form-input" :class="errors.name?'error':''"/>
          <div class="form-error" x-show="errors.name">الاسم مطلوب</div>
        </div>
        <div style="margin-bottom:18px;">
          <label class="form-label">رقم الموبايل *</label>
          <input x-model="form.phone" type="tel" placeholder="01xxxxxxxxx" class="form-input" :class="errors.phone?'error':''" dir="ltr" style="text-align:right;"/>
          <div class="form-error" x-show="errors.phone">يرجى إدخال رقم هاتف مصري صحيح</div>
        </div>
        <div style="margin-bottom:18px;">
          <label class="form-label">المحافظة *</label>
          <select x-model="form.gov" @change="updateShipping()" class="form-input" :class="errors.gov?'error':''">
            <option value="">— اختر المحافظة —</option>
            <optgroup label="القاهرة والجيزة (70 ج.م)">
              <option value="القاهرة">القاهرة</option>
              <option value="الجيزة">الجيزة</option>
            </optgroup>
            <optgroup label="الدلتا والوجه البحري (90 ج.م)">
              <option value="الإسكندرية">الإسكندرية</option>
              <option value="البحيرة">البحيرة</option>
              <option value="الدقهلية">الدقهلية</option>
              <option value="دمياط">دمياط</option>
              <option value="الغربية">الغربية</option>
              <option value="كفر الشيخ">كفر الشيخ</option>
              <option value="المنوفية">المنوفية</option>
              <option value="القليوبية">القليوبية</option>
              <option value="الشرقية">الشرقية</option>
            </optgroup>
            <optgroup label="القناة (95 ج.م)">
              <option value="الإسماعيلية">الإسماعيلية</option>
              <option value="بورسعيد">بورسعيد</option>
              <option value="السويس">السويس</option>
            </optgroup>
            <optgroup label="الصعيد (105 ج.م)">
              <option value="أسيوط">أسيوط</option>
              <option value="بني سويف">بني سويف</option>
              <option value="الفيوم">الفيوم</option>
              <option value="المنيا">المنيا</option>
              <option value="سوهاج">سوهاج</option>
            </optgroup>
            <optgroup label="الجنوب والحدود (155 ج.م)">
              <option value="أسوان">أسوان</option>
              <option value="البحر الأحمر">البحر الأحمر (الغردقة)</option>
              <option value="الأقصر">الأقصر</option>
              <option value="مطروح">مطروح</option>
              <option value="الوادي الجديد">الوادي الجديد</option>
              <option value="قنا">قنا</option>
              <option value="جنوب سيناء">جنوب سيناء</option>
            </optgroup>
          </select>
          <div class="form-error" x-show="errors.gov">المحافظة مطلوبة</div>
        </div>
        <div style="margin-bottom:18px;">
          <label class="form-label">العنوان بالتفصيل *</label>
          <textarea x-model="form.address" rows="3" placeholder="الشارع، الحي، المدينة..." class="form-input" :class="errors.address?'error':''"></textarea>
          <div class="form-error" x-show="errors.address">العنوان مطلوب</div>
        </div>
        <div style="margin-bottom:24px;">
          <label class="form-label">ملاحظات (اختياري)</label>
          <textarea x-model="form.notes" rows="2" placeholder="أي ملاحظات للمندوب..." class="form-input"></textarea>
        </div>

        <!-- PAYMENT -->
        <div style="margin-bottom:24px;">
          <label class="form-label" style="margin-bottom:12px;">طريقة الدفع</label>
          <div class="flex gap-3 flex-wrap">
            <label class="pay-option" :class="form.payment==='cod'?'active':''">
              <input type="radio" x-model="form.payment" value="cod" class="hidden"/>
              <i class="fas fa-money-bill-wave"></i>
              <div>
                <div style="font-weight:700;font-size:0.88rem;color:#000;">عند الاستلام</div>
                <div style="font-size:0.72rem;color:var(--muted);">كاش أو كريدت</div>
              </div>
            </label>
            <label class="pay-option" :class="form.payment==='whatsapp'?'active':''">
              <input type="radio" x-model="form.payment" value="whatsapp" class="hidden"/>
              <i class="fas fa-mobile-alt"></i>
              <div>
                <div style="font-weight:700;font-size:0.88rem;color:#000;">تحويل إلكتروني</div>
                <div style="font-size:0.72rem;color:var(--muted);">إنستاباي / فودافون</div>
              </div>
            </label>
          </div>
        </div>

        <button @click="submitOrder()" class="order-btn" :disabled="isSending">
          <template x-if="!isSending">
            <div class="flex items-center gap-2"><i class="fas fa-check-circle" style="font-size:1.3rem;"></i> تأكيد الطلب الآن</div>
          </template>
          <template x-if="isSending">
            <div class="flex items-center gap-2"><i class="fas fa-circle-notch fa-spin"></i> جاري إرسال طلبك...</div>
          </template>
        </button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="lg:col-span-2">
      <div class="summary-card">
        <h2 style="font-size:1rem;font-weight:900;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);">ملخص الطلب</h2>
        <div style="max-height:280px;overflow-y:auto;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;">
          <template x-for="item in cart" :key="item._key||item.id">
            <div style="display:flex;align-items:center;gap:10px;">
              <img :src="item.image_url||'https://placehold.co/50x50/f5f5f5/000000?text=K'" style="width:52px;height:52px;object-fit:cover;flex-shrink:0;background:var(--navy3);border:1px solid var(--border);"/>
              <div style="flex:1;min-width:0;">
                <p style="font-size:0.82rem;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;" x-text="item.name"></p>
                <p style="font-size:0.72rem;color:var(--muted);" x-text="(item.size?'مقاس '+item.size+' ':'')+(item.color?'| لون '+item.color+' ':'')+('× '+(item.qty||1))"></p>
              </div>
              <span style="font-weight:900;font-size:0.88rem;white-space:nowrap;color:#000;" x-text="((item.finalPrice||item.price)*(item.qty||1))+' ج.م'"></span>
            </div>
          </template>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:14px;display:flex;flex-direction:column;gap:8px;font-size:0.85rem;">
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--muted);">المجموع</span>
            <span style="font-weight:700;" x-text="subtotal+' ج.م'"></span>
          </div>
          <div x-show="discount>0" style="display:flex;justify-content:space-between;color:#22c55e;">
            <span>خصم</span>
            <span x-text="'- '+discount+' ج.م'"></span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--muted);">الشحن</span>
            <span style="font-weight:700;color:#000;" x-text="shippingCost>0?shippingCost+' ج.م':'اختر المحافظة'"></span>
          </div>
          <div style="border-top:1.5px solid #000;padding-top:10px;display:flex;justify-content:space-between;">
            <span style="font-size:1rem;font-weight:900;">الإجمالي</span>
            <span style="font-size:1.2rem;font-weight:900;color:#000;" x-text="total+' ج.م'"></span>
          </div>
        </div>
        <div style="display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:0.75rem;color:var(--muted);">
          <span><i class="fas fa-lock" style="color:#000;margin-left:4px;"></i>دفع آمن</span>
          <span><i class="fas fa-truck" style="color:#000;margin-left:4px;"></i>شحن سريع</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS SCREEN -->
<div x-show="orderDone" style="display:none;" class="max-w-lg mx-auto px-4 py-20 text-center">
  <div class="form-card" style="text-align:center; padding: 40px 20px; border-radius: 4px;">
    <div style="width:70px;height:70px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <i class="fas fa-check" style="color:#22c55e;font-size:2rem;"></i>
    </div>
    <h2 style="font-size:1.8rem;font-weight:900;margin-bottom:10px;">تم استلام طلبك! 🎉</h2>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:10px;">رقم الطلب:</p>
    <div style="background:var(--navy3);padding:10px 20px;border:1.5px solid #000;display:inline-block;margin-bottom:20px;">
      <span style="font-weight:900;font-size:1.2rem;color:#000;" x-text="orderNumber"></span>
    </div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:30px;">سيتواصل معك فريقنا قريباً لتأكيد الطلب وترتيب الشحن.</p>
    <a href="index.html" class="order-btn" style="text-decoration:none;">
      العودة للمتجر
    </a>
  </div>
</div>

<script>
const SHIPPING_MAP={
  'القاهرة':70,'الجيزة':70,
  'الإسكندرية':90,'البحيرة':90,'الدقهلية':90,'دمياط':90,'الغربية':90,'كفر الشيخ':90,'المنوفية':90,'القليوبية':90,'الشرقية':90,
  'الإسماعيلية':95,'بورسعيد':95,'السويس':95,
  'أسيوط':105,'بني سويف':105,'الفيوم':105,'المنيا':105,'سوهاج':105,
  'أسوان':155,'البحر الأحمر':155,'الأقصر':155,'مطروح':155,'الوادي الجديد':155,'قنا':155,'جنوب سيناء':155
};

function checkoutPage(){
  return{
    cart:[],discount:0,shippingCost:0,isSending:false, orderDone: false, orderNumber: '',
    form:{name:'',phone:'',gov:'',address:'',notes:'',payment:'cod'},
    errors:{name:false,phone:false,gov:false,address:false},
    init(){
      try{this.cart=JSON.parse(localStorage.getItem('kadry_cart')||'[]');}catch{}
      this.discount=parseInt(localStorage.getItem('kadry_discount')||'0');
      
      if(!this.cart.length) {
        this.cart = [{ id: 'test_shoe', name: 'حذاء كادري الرياضي', price: 850, qty: 1, size: '43', color: 'أبيض' }];
      }
    },
    get subtotal(){return this.cart.reduce((s,i)=>s+(i.finalPrice||i.price)*(i.qty||1),0);},
    get total(){return Math.max(0,this.subtotal-this.discount+this.shippingCost);},
    updateShipping(){this.shippingCost=SHIPPING_MAP[this.form.gov]||0;},
    validate(){
      this.errors.name=!this.form.name.trim();
      this.errors.phone=!/^01[0125][0-9]{8}$/.test(this.form.phone.trim());
      this.errors.gov=!this.form.gov;
      this.errors.address=!this.form.address.trim();
      return!Object.values(this.errors).some(Boolean);
    },
    async submitOrder(){
      if(!this.validate()) return;
      this.isSending = true;
      
      this.orderNumber = 'KADRY-' + Math.floor(100000 + Math.random() * 900000);
      
      const itemsText = this.cart.map(i => {
        let details = [];
        if (i.size) details.push(`مقاس: ${i.size}`);
        if (i.color) details.push(`لون: ${i.color}`);
        const detailsStr = details.length ? ` [${details.join(' - ')}]` : '';
        return `- ${i.name}${detailsStr} (كمية: ${i.qty||1})`;
      }).join('\n');

      const paymentMethod = this.form.payment === 'cod' ? 'الدفع عند الاستلام' : 'تحويل إلكتروني';

      const message = `🛒 طلب جديد متجر KADRY\n\n🆔 رقم الطلب: ${this.orderNumber}\n👤 الاسم: ${this.form.name.trim()}\n📞 الهاتف: ${this.form.phone.trim()}\n📍 المحافظة: ${this.form.gov}\n🏠 العنوان: ${this.form.address.trim()}\n💳 طريقة الدفع: ${paymentMethod}\n📝 ملاحظات: ${this.form.notes.trim() || 'لا يوجد'}\n\n📦 المنتجات:\n${itemsText}\n\n💰 إجمالي الحساب: ${this.total} ج.م`;

      const pUserKey  = 'uvzzjchk27ebj1dpnzahrqpnzgsqeg'; 
      const pApiToken = 'akb2ymien31hkq7i63mw9or1pgwszo'; 

      const formData = new FormData();
      formData.append('token', pApiToken);
      formData.append('user', pUserKey);
      formData.append('title', '🛒 طلب جديد KADRY!');
      formData.append('message', message);
      formData.append('priority', '1');
      formData.append('sound', 'cashregister');

      try {
        await fetch('https://api.pushover.net/1/messages.json', {
          method: 'POST',
          body: formData
        });
        
        // إفراغ السلة وعرض شاشة النجاح
        localStorage.removeItem('kadry_cart');
        this.orderDone = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        console.error('خطأ الإرسال:', err);
        alert('حدث خطأ أثناء إرسال الطلب، يرجى المحاولة مرة أخرى أو مراسلتنا.');
      } finally {
        this.isSending = false;
      }
    }
  }
}
</script>
</body>
</html>
