<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KADRY — تفاصيل المنتج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}
:root{
  --navy:#0a0f2e;--navy2:#0d1540;--navy3:#111b52;--blue:#1a2a6c;--blue2:#243580;--blue3:#2e4099;
  --accent:#c9a84c;--accent2:#e2c06a;--accent3:#f0d48a;--text:#e8ecff;--muted:#8a96c8;--border:rgba(100,120,255,0.15);--card:rgba(13,21,64,0.8);
}
body{background:var(--navy);color:var(--text);min-height:100vh;}
.nav-glass{background:rgba(10,15,46,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}

.size-btn{width:52px;height:52px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.size-btn.active,.size-btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border-color:var(--accent);}
.size-btn:disabled{opacity:0.3;cursor:not-allowed;}

.color-dot{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.2s;}
.color-dot.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,168,76,0.3);transform:scale(1.15);}

.btn-cart{background:linear-gradient(135deg,var(--blue2),var(--blue3));color:#fff;font-weight:900;padding:16px 32px;border-radius:14px;font-size:1rem;cursor:pointer;border:none;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;}
.btn-cart:hover{background:linear-gradient(135deg,var(--blue3),var(--blue2));transform:translateY(-2px);box-shadow:0 12px 30px rgba(26,42,108,0.5);}
.btn-buy{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);font-weight:900;padding:16px 32px;border-radius:14px;font-size:1rem;cursor:pointer;border:none;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;}
.btn-buy:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,168,76,0.4);}

.trust-badge{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted);}
.trust-badge i{color:var(--accent);font-size:0.9rem;}
.qty-btn{width:42px;height:42px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1.2rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.qty-btn:hover{background:var(--blue2);border-color:var(--accent);}

.toast-popup{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);font-weight:900;padding:12px 28px;border-radius:50px;z-index:9999;font-size:0.9rem;pointer-events:none;}
</style>
</head>
<body x-data="productPage()" x-init="init()">

<!-- NAVBAR -->
<nav class="nav-glass sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="index.html" style="font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;">KADRY</a>
    <div class="flex items-center gap-4">
      <a href="index.html" style="font-size:0.85rem;font-weight:700;color:var(--muted);" class="hover:text-white transition"><i class="fas fa-home ml-1"></i>الرئيسية</a>
      <a href="cart.html" class="relative">
        <i class="fas fa-shopping-bag" style="font-size:1.3rem;color:var(--text);"></i>
        <span x-show="cartCount>0" x-text="cartCount" style="position:absolute;top:-4px;left:-4px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);font-size:0.6rem;font-weight:900;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;"></span>
      </a>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="max-w-7xl mx-auto px-4 py-3" style="font-size:0.82rem;color:var(--muted);">
  <a href="index.html" class="hover:text-white transition">الرئيسية</a>
  <span class="mx-2">/</span>
  <a href="index.html#products" class="hover:text-white transition">المنتجات</a>
  <span class="mx-2">/</span>
  <span style="color:var(--text);" x-text="product.name||'المنتج'"></span>
</div>

<!-- PRODUCT -->
<section class="max-w-7xl mx-auto px-4 pb-20">
  <template x-if="product.id">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">

    <!-- IMAGE -->
    <div style="background:linear-gradient(135deg,var(--navy3),var(--blue));border-radius:24px;border:1px solid var(--border);overflow:hidden;min-height:420px;display:flex;align-items:center;justify-content:center;position:relative;">
      <img :src="product.image_url||'https://placehold.co/600x500/1a2a6c/c9a84c?text=KADRY'" :alt="product.name" style="width:100%;height:auto;object-fit:cover;max-height:500px;"/>
      <template x-if="hasDiscount()">
        <div style="position:absolute;top:16px;right:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);padding:8px 18px;border-radius:50px;font-weight:900;font-size:0.85rem;" x-text="product.discount_type==='percent'?'-'+product.discount_value+'%':'خصم '+product.discount_value+' ج.م'"></div>
      </template>
    </div>

    <!-- INFO -->
    <div>
      <div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--accent);padding:4px 14px;border-radius:50px;font-size:0.75rem;letter-spacing:2px;display:inline-block;margin-bottom:14px;" x-text="getCatName()"></div>
      <h1 style="font-size:clamp(1.5rem,3vw,2rem);font-weight:900;line-height:1.3;margin-bottom:16px;color:#fff;" x-text="product.name"></h1>

      <!-- PRICE -->
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;">
          <span style="font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" x-text="calcPrice()+' ج.م'"></span>
          <template x-if="hasDiscount()">
            <div>
              <span style="font-size:1.1rem;color:var(--muted);text-decoration:line-through;" x-text="product.price+' ج.م'"></span>
              <span style="display:block;font-size:0.8rem;color:#22c55e;font-weight:700;" x-text="'وفرت '+Math.max(0,product.price-calcPrice())+' ج.م'"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- SIZE -->
      <div style="margin-bottom:24px;">
        <div style="font-weight:900;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
          <span>المقاس <span x-show="selectedSize" style="color:var(--accent);" x-text="': '+selectedSize"></span></span>
        </div>
        <div class="flex flex-wrap gap-2">
          <template x-for="s in sizes">
            <button class="size-btn" :class="selectedSize===s?'active':''" @click="selectedSize=s" x-text="s"></button>
          </template>
        </div>
        <p x-show="sizeError" style="color:#ef4444;font-size:0.82rem;font-weight:700;margin-top:8px;">⚠️ يجب اختيار المقاس أولاً</p>
      </div>

      <!-- COLOR -->
      <div style="margin-bottom:24px;" x-show="colors.length>0">
        <div style="font-weight:900;font-size:1rem;margin-bottom:12px;">
          اللون <span x-show="selectedColor" style="color:var(--accent);" x-text="': '+selectedColor"></span>
        </div>
        <div class="flex flex-wrap gap-2">
          <template x-for="c in colors">
            <button class="color-dot" :class="selectedColor===c.name?'active':''" :style="'background:'+c.hex" :title="c.name" @click="selectedColor=c.name"></button>
          </template>
        </div>
      </div>

      <!-- QTY -->
      <div style="margin-bottom:24px;">
        <div style="font-weight:900;font-size:1rem;margin-bottom:12px;">الكمية</div>
        <div class="flex items-center gap-3">
          <button class="qty-btn" @click="qty=Math.max(1,qty-1)">−</button>
          <span style="min-width:40px;text-align:center;font-size:1.2rem;font-weight:900;" x-text="qty"></span>
          <button class="qty-btn" @click="qty++">+</button>
        </div>
      </div>

      <!-- TOTAL -->
      <div style="background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--muted);font-weight:700;">الإجمالي</span>
        <span style="font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" x-text="(calcPrice()*qty)+' ج.م'"></span>
      </div>

      <!-- ACTIONS -->
      <div class="flex gap-3 flex-col sm:flex-row">
        <button class="btn-cart" @click="addToCart()"><i class="fas fa-shopping-bag"></i> أضف للسلة</button>
        <button class="btn-buy" @click="buyNow()"><i class="fas fa-bolt"></i> اشتري الآن</button>
      </div>

      <!-- TRUST -->
      <div class="flex flex-wrap gap-4 mt-6">
        <div class="trust-badge"><i class="fas fa-truck"></i>شحن سريع</div>
        <div class="trust-badge"><i class="fas fa-shield-alt"></i>جودة مضمونة</div>
        <div class="trust-badge"><i class="fas fa-exchange-alt"></i>استبدال 14 يوم</div>
        <div class="trust-badge"><i class="fas fa-lock"></i>دفع آمن</div>
      </div>
    </div>
  </div>
  </template>

  <template x-if="!product.id">
    <div style="text-align:center;padding:80px 20px;color:var(--muted);">
      <i class="fas fa-box-open" style="font-size:4rem;margin-bottom:16px;display:block;"></i>
      <p style="font-size:1.2rem;font-weight:700;">المنتج غير موجود</p>
      <a href="index.html" style="display:inline-block;margin-top:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);padding:12px 32px;border-radius:50px;font-weight:900;">العودة للمتجر</a>
    </div>
  </template>
</section>

<div x-show="toast" x-transition class="toast-popup"><i class="fas fa-check-circle"></i> تمت الإضافة للسلة!</div>

<script>
function productPage(){
  return{
    product:{},qty:1,selectedSize:'',selectedColor:'',sizeError:false,toast:false,cartCount:0,
    sizes:[38,39,40,41,42,43,44,45],colors:[],
    init(){
      try{this.product=JSON.parse(localStorage.getItem('kadry_product')||'{}');}catch{}
      if(Array.isArray(this.product.sizes)&&this.product.sizes.length) this.sizes=this.product.sizes;
      if(Array.isArray(this.product.colors)&&this.product.colors.length) this.colors=this.product.colors;
      this.cartCount=this.getCart().length;
    },
    calcPrice(){
      const p=this.product;
      if(!p.discount_value) return p.price;
      if(p.discount_type==='percent') return Math.round(p.price*(1-p.discount_value/100));
      return Math.max(0,p.price-p.discount_value);
    },
    hasDiscount(){return this.product.discount_type&&this.product.discount_type!=='none'&&this.product.discount_value>0;},
    getCatName(){const m={sneakers:'كوتشيات',slippers:'سليبرز',sports:'رياضي',sandals:'صنادل'};return m[this.product.type]||'أحذية';},
    getCart(){try{return JSON.parse(localStorage.getItem('kadry_cart')||'[]');}catch{return[];}},
    addToCart(){
      if(!this.selectedSize){this.sizeError=true;return;}
      this.sizeError=false;
      const cart=this.getCart();
      const key=this.product.id+'_'+this.selectedSize+'_'+this.selectedColor;
      const idx=cart.findIndex(i=>i._key===key);
      const item={...this.product,qty:this.qty,size:this.selectedSize,color:this.selectedColor,_key:key,finalPrice:this.calcPrice()};
      if(idx>-1) cart[idx].qty+=this.qty; else cart.push(item);
      localStorage.setItem('kadry_cart',JSON.stringify(cart));
      this.cartCount=cart.length;
      this.toast=true;setTimeout(()=>this.toast=false,2500);
    },
    buyNow(){this.addToCart();if(this.selectedSize) window.location.href='cart.html';}
  }
}
</script>
</body>
</html>
